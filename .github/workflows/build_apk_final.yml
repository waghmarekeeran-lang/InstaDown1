name: Build InstaDown APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Locate Flutter project root
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" \
            -not -path "*/.git/*" \
            -not -path "*/build/*" | head -1)
          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "✅ Project found at: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Create .env
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" \
            > ${{ env.PROJECT_DIR }}/.env

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build DEBUG APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InstaDown-debug-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Show APK size
        run: |
          APK="${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk"
          echo "✅ APK size: $(du -sh $APK | cut -f1)"
