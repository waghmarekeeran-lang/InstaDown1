name: instadown
description: InstaDown — Social Media Video Downloader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1
  dio: ^5.4.3

  # Storage & files
  path_provider: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Media playback
  video_player: ^2.9.1

  # Permissions
  permission_handler: ^11.3.1

  # Env / config
  flutter_dotenv: ^5.2.1

  # Image caching
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
